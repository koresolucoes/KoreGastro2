<div class="fixed inset-0 bg-overlay/80 backdrop-blur-sm z-[60] flex items-center justify-center p-4" (click)="closeModal.emit()">
  <div class="bg-surface-elevated rounded-2xl shadow-xl w-full max-w-sm border border-subtle overflow-hidden" (click)="$event.stopPropagation()">
    <div class="p-5 border-b border-subtle bg-surface flex justify-between items-center">
        <h3 class="text-xl font-black text-title tracking-tight flex items-center gap-2"><span class="material-symbols-outlined text-warning">pin</span> {{ title() }} <span class="text-[11px] font-black tracking-widest uppercase mt-1 opacity-70">#{{ order()?.ifood_display_id }}</span></h3>
        <button (click)="closeModal.emit()" class="p-2 rounded-full text-muted hover:bg-surface-elevated hover:text-title transition-colors">
          <span class="material-symbols-outlined text-[20px]">close</span>
        </button>
    </div>
    <div class="p-6 space-y-5 bg-surface/30 text-center">
      <p class="text-xs font-bold text-muted">{{ description() }}</p>
      <input 
        type="text" 
        [value]="verificationCode()"
        (input)="onCodeInput($event)"
        name="verificationCode" 
        maxlength="4" 
        pattern="[0-9]*"
        inputmode="numeric"
        class="w-full bg-surface border border-strong rounded-xl p-4 text-title text-4xl font-mono font-black tracking-[0.5em] text-center focus:outline-none focus:border-warning focus:ring-1 focus:ring-warning transition-all placeholder:text-muted/30" 
        placeholder="----">
    </div>
    <div class="p-5 bg-surface border-t border-subtle flex justify-end gap-3 rounded-b-2xl">
      <button (click)="closeModal.emit()" class="px-5 py-2.5 font-black text-[11px] uppercase tracking-widest rounded-xl bg-surface border border-strong hover:bg-surface-elevated text-title transition-all active:scale-95 shadow-sm">Cancelar</button>
      <button (click)="onConfirm()" [disabled]="verificationCode().length !== 4" class="px-5 py-2.5 font-black text-[11px] uppercase tracking-widest rounded-xl bg-warning hover:bg-warning-hover text-surface-elevated flex items-center gap-2 transition-all active:scale-95 shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
        <span class="material-symbols-outlined text-[16px]">check_circle</span> Verificar
      </button>
    </div>
  </div>
</div>
