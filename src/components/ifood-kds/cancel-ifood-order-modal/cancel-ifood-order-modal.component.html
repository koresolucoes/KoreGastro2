<div class="fixed inset-0 bg-overlay/80 backdrop-blur-sm z-[60] flex items-center justify-center p-4" (click)="closeModal.emit()">
  <div class="bg-surface-elevated rounded-2xl shadow-xl w-full max-w-lg border border-subtle overflow-hidden" (click)="$event.stopPropagation()">
    <div class="p-5 border-b border-subtle bg-surface flex justify-between items-center">
        <h3 class="text-xl font-black text-title tracking-tight flex items-center gap-2"><span class="material-symbols-outlined text-danger">cancel</span> Cancelar Pedido #{{ order()?.ifood_display_id }}</h3>
        <button (click)="closeModal.emit()" class="p-2 rounded-full text-muted hover:bg-surface-elevated hover:text-title transition-colors">
          <span class="material-symbols-outlined text-[20px]">close</span>
        </button>
    </div>
    <div class="p-6 space-y-5 bg-surface/30">
      <div>
        <label class="block text-[11px] font-black uppercase tracking-widest text-muted mb-2">Motivo do Cancelamento <span class="text-danger">*</span></label>
        <select 
          [ngModel]="selectedReasonCode()" 
          (ngModelChange)="selectedReasonCode.set($event)" 
          name="cancellationReason"
          class="w-full bg-surface border border-strong rounded-xl px-4 py-3 text-sm font-medium text-title focus:outline-none focus:border-danger focus:ring-1 focus:ring-danger transition-all cursor-pointer">
          @for(reason of reasons(); track reason.code) {
            <option [value]="reason.code">{{ reason.description }}</option>
          }
        </select>
      </div>
      <div>
        <label class="block text-[11px] font-black uppercase tracking-widest text-muted mb-2">Observações <span class="opacity-60 text-[9px]">(Opcional)</span></label>
        <textarea 
          [ngModel]="comments()"
          (ngModelChange)="comments.set($event)"
          name="cancellationComments"
          rows="3" 
          placeholder="Adicione detalhes, se necessário..."
          class="w-full bg-surface border border-strong rounded-xl px-4 py-3 text-sm font-medium text-title focus:outline-none focus:border-danger focus:ring-1 focus:ring-danger transition-all placeholder:text-muted custom-scrollbar"></textarea>
      </div>
    </div>
    <div class="p-5 bg-surface border-t border-subtle flex justify-end gap-3 rounded-b-2xl">
       <button (click)="closeModal.emit()" class="px-5 py-2.5 font-black text-[11px] uppercase tracking-widest rounded-xl bg-surface border border-strong hover:bg-surface-elevated text-title transition-all active:scale-95 shadow-sm">Voltar</button>
       <button (click)="onConfirm()" class="px-5 py-2.5 font-black text-[11px] uppercase tracking-widest rounded-xl bg-danger hover:bg-danger-hover text-white flex items-center gap-2 transition-all active:scale-95 shadow-sm">
         <span class="material-symbols-outlined text-[16px]">priority_high</span> Confirmar Cancelamento
       </button>
    </div>
  </div>
</div>
