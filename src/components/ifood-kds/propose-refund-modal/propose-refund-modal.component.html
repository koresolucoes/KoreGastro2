<div class="fixed inset-0 bg-overlay/80 backdrop-blur-sm z-[60] flex items-center justify-center p-4" (click)="closeModal.emit()">
  <div class="bg-surface-elevated rounded-2xl shadow-xl w-full max-w-lg border border-subtle overflow-hidden" (click)="$event.stopPropagation()">
    <div class="p-5 border-b border-subtle bg-surface flex justify-between items-center">
      <h3 class="text-xl font-black text-title tracking-tight flex items-center gap-2"><span class="material-symbols-outlined text-brand">payments</span> Propor Reembolso <span class="text-[11px] font-black tracking-widest uppercase mt-1 opacity-70">#{{ order()?.ifood_display_id }}</span></h3>
      <button (click)="closeModal.emit()" class="p-2 rounded-full text-muted hover:bg-surface-elevated hover:text-title transition-colors">
        <span class="material-symbols-outlined text-[20px]">close</span>
      </button>
    </div>
    <div class="p-6 space-y-5 bg-surface/30">
      <div>
        <label class="block text-[11px] font-black uppercase tracking-widest text-muted mb-2">Valor do Reembolso <span class="opacity-60 text-[9px]">(R$)</span></label>
        <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-muted font-bold">R$</span>
          <input 
            type="number"
            step="0.01"
            [(ngModel)]="refundAmount"
            name="refundAmount"
            [max]="maxRefund()"
            placeholder="0.00"
            class="w-full bg-surface border border-strong rounded-xl pl-10 pr-4 py-3 text-lg font-black text-title focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-all placeholder:text-muted">
        </div>
        <p class="text-[10px] font-bold text-muted uppercase tracking-widest mt-3 flex items-center gap-1 bg-surface border border-subtle p-2 rounded-lg">
          <span class="material-symbols-outlined text-[14px]">info</span> Máx. permitido: <span class="text-brand">{{ maxRefund() | currency:'BRL' }}</span>
        </p>
      </div>
    </div>
    <div class="p-5 bg-surface border-t border-subtle flex justify-end gap-3 rounded-b-2xl">
      <button (click)="closeModal.emit()" class="px-5 py-2.5 font-black text-[11px] uppercase tracking-widest rounded-xl bg-surface border border-strong hover:bg-surface-elevated text-title transition-all active:scale-95 shadow-sm">Cancelar</button>
      <button (click)="onConfirm()" [disabled]="!isAmountValid()" class="px-5 py-2.5 font-black text-[11px] uppercase tracking-widest rounded-xl bg-brand hover:bg-brand-hover text-white flex items-center gap-2 transition-all active:scale-95 shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
        <span class="material-symbols-outlined text-[16px]">send</span> Enviar Contraproposta
      </button>
    </div>
  </div>
</div>
