<div class="fixed top-4 left-1/2 -translate-x-1/2 z-[9999] space-y-2 flex flex-col items-center w-full max-w-sm px-4 pointer-events-none">
  @for (toast of toasts(); track toast.id) {
    <div class="pointer-events-auto w-full">
      <app-toast
        [message]="toast.message"
        [type]="toast.type"
        (close)="toastService.remove(toast.id)"
      >
      </app-toast>
    </div>
  }
</div>
