
<div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-in fade-in duration-200" (click)="close.emit()">
  <div class="chef-surface rounded-2xl shadow-2xl w-full max-w-sm" (click)="$event.stopPropagation()">
    <div class="p-6 text-center">
      <h3 class="text-xl font-bold text-title mb-2">Autorização Necessária</h3>
      <p class="text-muted mb-6">Apenas gerentes podem realizar esta ação. Digite seu PIN.</p>
      
      <div class="flex justify-center items-center gap-4 h-12 mb-6 text-4xl tracking-[1em] data-mono" [class.animate-pulse]="hasError()" [class.text-danger]="hasError()" [class.text-title]="!hasError()">
        {{ pinDisplay() }}
      </div>

      <div class="grid grid-cols-3 gap-3 mb-4">
        @for(digit of ['1', '2', '3', '4', '5', '6', '7', '8', '9']; track digit) {
          <button (click)="handleInput(digit)" class="p-4 bg-surface-elevated border border-strong rounded-xl text-xl font-bold text-title hover-surface-elevated transition-colors shadow-sm">{{ digit }}</button>
        }
        <button (click)="clear()" class="p-4 bg-surface-elevated border border-strong rounded-xl text-sm font-semibold text-danger hover:bg-danger/10 hover:border-danger/30 transition-colors shadow-sm">C</button>
        <button (click)="handleInput('0')" class="p-4 bg-surface-elevated border border-strong rounded-xl text-xl font-bold text-title hover-surface-elevated transition-colors shadow-sm">0</button>
        <button (click)="deleteDigit()" class="p-4 bg-surface-elevated border border-strong rounded-xl text-title hover-surface-elevated transition-colors flex items-center justify-center shadow-sm">
          <span class="material-symbols-outlined">backspace</span>
        </button>
      </div>

      <button (click)="close.emit()" class="w-full py-2 text-muted hover:text-title transition-colors font-medium">Cancelar</button>
    </div>
  </div>
</div>
