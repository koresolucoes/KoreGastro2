<div class="flex min-h-screen bg-app relative overflow-hidden">
  <!-- Liquid Glow Background Orbs -->
  <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
    <div class="absolute top-[-20%] left-[-10%] w-[600px] h-[600px] rounded-full bg-brand/20 blur-[120px] mix-blend-screen animate-pulse"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] rounded-full bg-brand/10 blur-[100px] mix-blend-screen" style="animation: pulse 8s infinite alternate;"></div>
  </div>

  <!-- Left Side: Branding (Hidden on Mobile) -->
  <div class="hidden lg:flex lg:w-1/2 relative p-6">
    <div class="relative w-full h-full rounded-[2.5rem] overflow-hidden border border-strong shadow-2xl flex flex-col justify-center items-center">
      <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?q=80&w=1974&auto=format&fit=crop')] bg-cover bg-center"></div>
      <div class="absolute inset-0 bg-surface-elevated/70 backdrop-blur-[4px]"></div>
      <div class="relative z-10 text-center p-12">
        <h1 class="text-7xl font-black text-title mb-6 tracking-tighter drop-shadow-xl">
          Chef<span class="text-brand">OS</span>
        </h1>
        <p class="text-2xl text-body font-medium max-w-lg mx-auto drop-shadow-md">
          O Sistema Operacional definitivo para o seu restaurante.
        </p>
      </div>
    </div>
  </div>

  <!-- Right Side: Form -->
  <div class="w-full lg:w-1/2 flex items-center justify-center p-4 sm:p-12 relative z-10">
    <div class="w-full max-w-md bg-surface-elevated/80 backdrop-blur-xl p-8 sm:p-10 rounded-[2.5rem] shadow-[0_8px_40px_rgba(0,0,0,0.12)] border border-strong relative overflow-hidden">
      <!-- Glow accent line top -->
      <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-transparent via-brand to-transparent opacity-60"></div>
      
      <div class="text-center lg:text-left mb-10">
        <h1 class="text-5xl font-black text-title mb-4 lg:hidden tracking-tighter">
          Chef<span class="text-brand">OS</span>
        </h1>
        <h2 class="text-3xl font-bold text-title tracking-tight">Acesse sua conta</h2>
        <p class="mt-2 text-sm text-muted font-medium">Entre com seu e-mail e senha para continuar.</p>
      </div>
      
      <form class="space-y-6" (ngSubmit)="handleLogin()" novalidate>
        <div class="space-y-4">
          <div class="relative group">
            <label for="email-address" class="sr-only">Endereço de e-mail</label>
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-muted group-focus-within:text-brand transition-colors">
              <span class="material-symbols-outlined">mail</span>
            </div>
            <input id="email-address" name="email" type="email" autocomplete="email" required
              [value]="email()" (input)="email.set($any($event.target).value)"
              class="block w-full pl-12 pr-4 py-4 text-base bg-surface border border-strong rounded-2xl text-title placeholder-muted focus:outline-none focus:ring-2 focus:ring-brand/50 focus:border-brand transition-all shadow-inner" 
              placeholder="seu-email@dominio.com">
          </div>
          <div class="relative group">
            <label for="password" class="sr-only">Senha</label>
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-muted group-focus-within:text-brand transition-colors">
              <span class="material-symbols-outlined">lock</span>
            </div>
            <input id="password" name="password" type="password" autocomplete="current-password" required
              [value]="password()" (input)="password.set($any($event.target).value)"
              class="block w-full pl-12 pr-4 py-4 text-base bg-surface border border-strong rounded-2xl text-title placeholder-muted focus:outline-none focus:ring-2 focus:ring-brand/50 focus:border-brand transition-all shadow-inner" 
              placeholder="Sua senha">
          </div>
        </div>

        <div class="flex items-center justify-end text-sm">
          <a (click)="forgotPassword()" class="font-bold text-brand hover:text-brand-light cursor-pointer transition-colors">
            Esqueceu sua senha?
          </a>
        </div>

        @if(authState() === 'error') {
          <div class="p-4 bg-danger/10 border border-danger/20 rounded-2xl animate-in fade-in slide-in-from-top-2">
            <p class="text-sm font-semibold text-danger text-center">{{ errorMessage() }}</p>
          </div>
        }

        <button type="submit" [disabled]="authState() === 'loading'"
          class="group relative w-full flex justify-center items-center gap-2 py-4 px-4 text-lg font-black rounded-2xl text-white bg-brand hover:brightness-110 focus:outline-none focus:ring-4 focus:ring-brand/30 disabled:opacity-50 disabled:cursor-not-allowed transition-all hover:-translate-y-1 active:translate-y-0 shadow-lg shadow-brand/20">
          @if(authState() === 'loading') {
            <svg class="animate-spin h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Entrando...
          } @else {
             Entrar <span class="material-symbols-outlined text-2xl transition-transform group-hover:translate-x-1">arrow_forward</span>
          }
        </button>
      </form>

      <div class="text-center pt-8 mt-8 border-t border-subtle space-y-5">
        <p class="text-sm font-medium text-muted">
          Novo no ChefOS?
          <a routerLink="/register" class="font-bold text-brand hover:text-brand-light transition-colors cursor-pointer ml-1">
            Crie sua conta
          </a>
        </p>
        
        <div class="pt-2">
          <a routerLink="/admin" class="inline-flex items-center gap-2 text-[10px] font-black text-muted hover:text-title transition-colors uppercase tracking-widest bg-surface px-4 py-2 rounded-full border border-strong shadow-sm hover:-translate-y-0.5">
            <span class="material-symbols-outlined text-sm">admin_panel_settings</span>
            Acesso Administrativo
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
