<div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-in fade-in" (click)="onClose()">
  <div class="chef-surface rounded-2xl shadow-2xl w-full max-w-lg border border-subtle" (click)="$event.stopPropagation()">
    <div class="flex justify-between items-center p-5 border-b border-subtle bg-surface-elevated rounded-t-2xl">
      <h3 class="text-xl font-bold text-title flex items-center gap-2">
        <span class="material-symbols-outlined text-brand">move_up</span>
        Mover Pedido - Mesa {{ sourceTable()?.number }}
      </h3>
      <button (click)="onClose()" class="p-2 rounded-xl text-muted hover-surface-elevated hover:text-title transition-colors">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="p-6">
      <p class="text-muted font-bold tracking-wider uppercase text-xs mb-4">Selecione a mesa de destino livre:</p>
      @if(availableTables().length > 0) {
          <div class="grid grid-cols-4 sm:grid-cols-5 gap-3">
              @for(table of availableTables(); track table.id) {
                  <button (click)="onMoveOrder(table)" class="bg-success/10 text-success font-black text-xl p-3 rounded-2xl border-2 border-success/30 hover:bg-success hover:border-success hover:text-white transition-colors shadow-sm relative overflow-hidden group">
                      <span class="relative z-10">{{ table.number }}</span>
                      <div class="absolute inset-0 bg-white/20 scale-0 group-hover:scale-100 transition-transform rounded-xl rounded-2xl"></div>
                  </button>
              }
          </div>
      } @else {
          <div class="text-center bg-surface-elevated rounded-xl p-8 border border-strong flex flex-col items-center justify-center gap-3">
             <span class="material-symbols-outlined text-5xl text-muted opacity-50">block</span>
             <p class="text-muted font-bold">Nenhuma mesa livre disponível neste salão.</p>
          </div>
      }
    </div>
  </div>
</div>
