<div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-in fade-in" (click)="closeModal.emit()">
  <div class="chef-surface rounded-2xl shadow-2xl w-full max-w-md border border-subtle" (click)="$event.stopPropagation()">
    <div class="p-5 border-b border-subtle flex justify-between items-center bg-surface-elevated rounded-t-2xl">
      <h3 class="text-xl font-bold text-title flex items-center gap-2">
        <span class="material-symbols-outlined text-brand">dataset</span>
        Gerenciar Salões
      </h3>
      <button (click)="closeModal.emit()" class="p-2 rounded-xl text-muted hover-surface-elevated hover:text-title transition-colors">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="p-6 max-h-[70vh] overflow-y-auto custom-scrollbar">
      <div class="mb-5 bg-surface-elevated border border-strong rounded-xl p-4 shadow-inner">
        <label class="block text-sm font-bold text-title uppercase tracking-wider mb-2">Adicionar Novo Salão</label>
        <div class="flex gap-2">
          <input type="text" [value]="newHallName()" (input)="newHallName.set($any($event.target).value)" (keydown.enter)="addHall()" placeholder="Nome do salão" class="flex-1 bg-surface border border-subtle rounded-xl px-4 py-2.5 text-title focus:border-brand focus:ring-1 focus:ring-brand outline-none shadow-sm transition-colors">
          <button (click)="addHall()" [disabled]="!newHallName().trim()" class="px-5 py-2.5 font-bold rounded-xl bg-brand/10 hover:bg-brand/20 text-brand border border-brand/30 disabled:opacity-50 disabled:cursor-not-allowed transition-colors shadow-sm flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">add</span>
            Adicionar
          </button>
        </div>
      </div>
      <ul class="space-y-3">
        @for(hall of halls(); track hall.id) {
          <li class="flex items-center justify-between bg-surface border border-subtle shadow-sm p-3 rounded-xl min-h-[64px] hover-surface-elevated transition-colors">
            @if(editingHall()?.id === hall.id) {
              <input type="text" [value]="editingHall()!.name" (input)="updateEditingHallName($event)" (keydown.enter)="saveHall()" (keydown.escape)="cancelEditing()" class="flex-1 bg-surface-elevated border border-brand rounded-xl px-3 py-2 text-title focus:outline-none shadow-inner">
              <div class="flex gap-2 ml-3">
                <button (click)="saveHall()" class="p-2 text-success hover:bg-success/10 rounded-lg transition-colors border border-transparent hover:border-success/30"><span class="material-symbols-outlined">check</span></button>
                <button (click)="cancelEditing()" class="p-2 text-muted hover:text-danger hover:bg-danger/10 rounded-lg transition-colors border border-transparent hover:border-danger/30"><span class="material-symbols-outlined">close</span></button>
              </div>
            } @else if (hallPendingDeletion()?.id === hall.id) {
              <span class="text-sm text-danger font-bold uppercase tracking-wider flex items-center gap-1">
                <span class="material-symbols-outlined text-lg">warning</span>
                Deletar c/ mesas?
              </span>
              <div class="flex gap-2 ml-2">
                <button (click)="confirmDelete()" class="px-4 py-1.5 text-sm font-bold rounded-lg bg-danger/10 hover:bg-danger/20 text-danger border border-danger/30 transition-colors shadow-sm">Sim</button>
                <button (click)="cancelDelete()" class="px-4 py-1.5 text-sm font-bold rounded-lg bg-surface border border-strong text-title hover-surface-elevated transition-colors shadow-sm">Não</button>
              </div>
            } @else {
              <span class="font-bold text-title flex items-center gap-2 text-lg drop-shadow-sm">
                <span class="material-symbols-outlined text-brand opacity-60">table_restaurant</span>
                {{ hall.name }}
              </span>
              <div class="flex gap-2">
                <button (click)="startEditing(hall)" class="p-2 text-brand hover:bg-brand/10 rounded-lg transition-colors"><span class="material-symbols-outlined text-xl">edit</span></button>
                <button (click)="requestDelete(hall)" class="p-2 text-danger hover:bg-danger/10 rounded-lg transition-colors"><span class="material-symbols-outlined text-xl">delete</span></button>
              </div>
            }
          </li>
        }
      </ul>
    </div>
  </div>
</div>
