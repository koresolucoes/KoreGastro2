
<div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-in fade-in" (click)="close.emit()">
  <div class="chef-surface rounded-2xl shadow-2xl w-full max-w-md" (click)="$event.stopPropagation()">
    <div class="p-4 border-b border-subtle">
      <h3 class="text-xl font-bold text-title">{{ title() }}</h3>
    </div>
    <div class="p-6">
      <p class="text-body mb-2 text-sm">Por favor, informe o motivo do cancelamento para registro.</p>
      <textarea 
        [value]="reason()"
        (input)="reason.set($any($event.target).value)"
        rows="4" 
        placeholder="Ex: Cliente desistiu, Erro de lançamento..."
        class="w-full bg-surface-elevated border border-strong rounded-xl p-3 text-title placeholder:text-muted focus:outline-none focus:ring-2 focus:ring-danger shadow-inner">
      </textarea>
      
      <div class="mt-4 flex items-center">
        <input 
          type="checkbox" 
          id="returnToStock" 
          [checked]="returnToStock()"
          (change)="returnToStock.set($any($event.target).checked)"
          class="h-4 w-4 rounded border-subtle bg-surface-elevated text-danger focus:ring-danger focus:ring-offset-surface"
        >
        <label for="returnToStock" class="ml-2 block text-sm text-body">
          Retornar itens ao estoque?
        </label>
      </div>
    </div>
    <div class="p-4 bg-surface-elevated flex justify-end gap-3 rounded-b-2xl border-t border-subtle">
      <button (click)="close.emit()" class="px-4 py-2 font-medium rounded-lg text-title bg-surface hover-surface-elevated border border-subtle transition-colors">Cancelar</button>
      <button (click)="onConfirm()" [disabled]="!reason().trim()" class="px-4 py-2 font-bold rounded-lg bg-danger/10 hover:bg-danger/20 text-danger border border-danger/30 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
        Confirmar Cancelamento
      </button>
    </div>
  </div>
</div>
