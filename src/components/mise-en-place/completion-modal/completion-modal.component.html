
<div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4 transition-all" (click)="close.emit()">
  <div class="chef-surface w-full max-w-lg max-h-[90vh] flex flex-col shadow-2xl animate-in fade-in zoom-in duration-200" (click)="$event.stopPropagation()">
    <!-- Header -->
    <div class="p-6 border-b border-subtle flex justify-between items-center bg-surface/50 rounded-t-2xl">
      <h3 class="title-display text-2xl text-title">Finalizar Produção</h3>
      <button (click)="close.emit()" class="w-10 h-10 rounded-full hover-surface-elevated flex items-center justify-center text-muted hover:text-title transition-colors">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <!-- Body -->
    <div class="p-6 space-y-6 overflow-y-auto custom-scrollbar">
        <div class="bg-surface-elevated p-5 rounded-xl border border-subtle shadow-sm relative overflow-hidden">
            <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-brand"></div>
            <p class="text-xs font-bold text-muted uppercase tracking-wider mb-1 pl-2">Tarefa Finalizada</p>
            <p class="font-bold text-title text-xl pl-2">{{ taskName() }}</p>
            <div class="flex items-center gap-2 mt-3 pl-2">
                <span class="bg-surface text-muted text-xs font-bold px-2 py-1 rounded border border-subtle">
                    Planejado: <span class="text-title">{{ task().quantity_to_produce }} un</span>
                </span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-bold text-muted uppercase tracking-wider mb-2">Qtd. Produzida (Real)</label>
                <div class="relative">
                    <input type="number" [ngModel]="producedQuantity()" (ngModelChange)="producedQuantity.set(+$event)" class="w-full bg-surface-elevated border border-strong rounded-xl px-4 py-3 text-brand font-black text-2xl text-center focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition-all">
                </div>
                <p class="text-[11px] text-muted mt-2 text-center font-medium leading-tight">O estoque será atualizado com este valor.</p>
            </div>
            <div>
                <label class="block text-sm font-bold text-muted uppercase tracking-wider mb-2">Data de Validade</label>
                <input type="date" [ngModel]="expirationDate()" (ngModelChange)="expirationDate.set($event)" class="w-full bg-surface-elevated border border-strong rounded-xl px-4 py-3 text-warning font-bold focus:outline-none focus:ring-2 focus:ring-warning focus:border-transparent transition-all cursor-pointer">
            </div>
        </div>

        <div>
            <label class="block text-sm font-bold text-muted uppercase tracking-wider mb-2">Nº do Lote <span class="text-[10px] bg-surface-elevated px-1.5 py-0.5 rounded ml-1 font-normal">(Opcional)</span></label>
            <input type="text" [ngModel]="lotNumber()" (ngModelChange)="lotNumber.set($event)" class="w-full bg-surface-elevated border border-strong rounded-xl px-4 py-3 text-title font-medium focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition-all data-mono">
        </div>

        <div>
            <label class="block text-sm font-bold text-muted uppercase tracking-wider mb-2">Observações <span class="text-[10px] bg-surface-elevated px-1.5 py-0.5 rounded ml-1 font-normal">(Opcional)</span></label>
            <textarea [ngModel]="notes()" (ngModelChange)="notes.set($event)" rows="2" placeholder="Ex: Rendeu menos pois deixei reduzir mais." class="w-full bg-surface-elevated border border-strong rounded-xl px-4 py-3 text-body focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition-all resize-none"></textarea>
        </div>

        <div class="flex items-center gap-3 pt-2 bg-surface-elevated/50 p-4 rounded-xl border border-subtle">
            <input type="checkbox" id="printLabel" [ngModel]="printLabel()" (ngModelChange)="printLabel.set($event)" class="h-5 w-5 rounded border-strong text-brand focus:ring-brand bg-surface cursor-pointer">
            <label for="printLabel" class="text-sm font-bold text-title cursor-pointer select-none">Imprimir Etiqueta ao Salvar</label>
        </div>
    </div>

    <!-- Footer -->
    <div class="p-6 border-t border-subtle bg-surface/50 rounded-b-2xl flex justify-end gap-3 mt-4">
        <button (click)="close.emit()" class="px-6 py-2.5 font-bold rounded-xl text-muted hover:bg-surface-elevated transition-colors border border-transparent">
            Cancelar
        </button>
        <button (click)="confirm()" class="btn-primary flex items-center justify-center gap-2 px-8 py-2.5 rounded-xl font-bold hover:-translate-y-0.5 active:translate-y-0 shadow-lg shadow-brand/20">
            <span class="material-symbols-outlined">check_circle</span>
            Concluir Produção
        </button>
    </div>
  </div>
</div>
